name: CI
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
    types:
      - opened
      - edited
      - reopened
      - synchronize
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * SUN"
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
permissions: {}
defaults:
  run:
    shell: bash
jobs:
  paths:
    name: Detect changes
    if: github.event_name == 'pull_request' || github.event_name == 'push'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read # for checkout and changed files
      pull-requests: read # for changed files
    outputs:
      build: ${{ steps.filter.outputs.build }}
      docs: ${{ steps.filter.outputs.docs }}
      test: ${{ steps.filter.outputs.test }}
      schema: ${{ steps.filter.outputs.schema }}
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Check release-affecting files
        id: filter
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            ci: &ci
              - 'mise.toml'
              - 'mise.lock'
              - '.github/workflows/ci.yml'
            docs:
              - *ci
              - 'docs/**'
              - 'tasks.toml'
            build: &build
              - *ci
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src/**'
              - '.github/workflows/release.yml'
              - 'dist-workspace.toml'
            test:
              - *ci
              - *build
              - 'docker-compose.yml'
              - 'tests/**'
              - 'tarpaulin.toml'
              - 'tasks.toml'
            schema:
              - *ci
              - 'schema/**'
              - 'tasks/schema/**'
              - 'tasks.toml'
  pr-title:
    name: Lint PR title
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      pull-requests: read # for semantic PR title linting
    steps:
      - uses: amannn/action-semantic-pull-request@48f256284bd46cdaab1048c3721360e808335d50 # v6.1.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
        with:
          # always sync with release-plz.toml
          # `Revert` or `Reapply` PR titles can't be parsed
          # ref: https://github.com/amannn/action-semantic-pull-request/issues/278
          types: |
            feat
            fix
            perf
            refactor
            docs
            test
            style
            build
            ci
            chore
            revert
  test:
    name: Test
    needs:
      - paths
    if: ${{ !cancelled() && !failure() && needs.paths.outputs.test == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout
      id-token: write # for codecov
    env:
      MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup
      MISE_CARGO_HOME: /home/runner/.local/share/mise/cargo
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Start SSH test services
        run: docker compose up --build --detach --wait --wait-timeout 60
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.11
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "false"
      - name: Test (coverage)
        run: mise run test:coverage
      - name: Show SSH service logs
        if: failure()
        run: docker compose logs --no-color
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v7.0.0
        with:
          files: ./cobertura.xml
          fail_ci_if_error: true
          use_oidc: true
  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout
    env:
      MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup
      MISE_CARGO_HOME: /home/runner/.local/share/mise/cargo
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.11
      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "false"
      - name: Render
        run: mise run --jobs 1 --continue-on-error render
      - name: Lint
        run: mise run --jobs 1 --continue-on-error check --lint
        env:
          GITHUB_TOKEN: ${{ github.token }}
  schema:
    name: Schema
    needs:
      - paths
    if: ${{ !cancelled() && !failure() && needs.paths.outputs.schema == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
    env:
      MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup
      MISE_CARGO_HOME: /home/runner/.local/share/mise/cargo
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.11
      - name: Validate schema
        run: mise run schema
  build:
    name: Build
    needs:
      - paths
    if: ${{ !cancelled() && !failure() && needs.paths.outputs.build == 'true' }}
    # All permissions in the callee workflow are required for the reusable workflow
    permissions:
      contents: write # for release checkout and GitHub release creation
      attestations: write # for release artifact attestations
      id-token: write # for release artifact attestations
      actions: read # for release artifact downloads
    uses: ./.github/workflows/release.yml
  docs:
    name: Build docs
    needs:
      - paths
    if: ${{ always() && !cancelled() && !failure() && (needs.paths.outputs.docs == 'true' || github.event_name == 'workflow_dispatch') }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read # for checkout
    env:
      MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup
      MISE_CARGO_HOME: /home/runner/.local/share/mise/cargo
    steps:
      - name: Checkout
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@dad1bfd3df957f44999b559dd69dc1671cb4e9ea # v4.2.1
        with:
          version: 2026.7.11
        env:
          MISE_ENABLE_TOOLS: bun,node,wrangler
      - name: Build docs
        run: mise run docs:build
      - name: Deploy docs
        uses: risu729/wrangler-deploy-action@a282705ddae16c69574bfe62cdda8cef47f963cb # v1.1.0
        with:
          mode: ${{ github.event_name == 'pull_request' && 'preview-or-dry-run' || 'production' }}
          working-directory: docs
          config: .vitepress/dist/wrangler.json
          preview-alias: pr-${{ github.event.pull_request.number }}
          cloudflare-account-id: ${{ vars.CLOUDFLARE_ACCOUNT_ID }}
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
  ci-check:
    name: CI Check
    needs:
      - pr-title
      - test
      - lint
      - build
      - schema
      - docs
    if: ${{ !cancelled() && (contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')) }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    steps:
      - run: exit 1
  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - ci-check
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # for actions-timeline
    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1
