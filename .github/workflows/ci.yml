name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * SUN"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  paths:
    name: Detect changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      pull-requests: read # for changed files

    outputs:
      build: ${{ steps.filter.outputs.build }}
      test: ${{ steps.filter.outputs.test }}
      schema: ${{ steps.filter.outputs.schema }}

    steps:
      - name: Check release-affecting files
        id: filter
        uses: dorny/paths-filter@fbd0ab8f3e69293af611ebaee6363fc25e6d187d # v4.0.1
        with:
          filters: |
            ci: &ci
              - 'mise.toml'
              - 'mise.lock'
              - '.github/workflows/ci.yml'
            build: &build
              - *ci
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src/**'
              - '.github/workflows/release.yml'
              - 'dist-workspace.toml'
            test:
              - *ci
              - *build
              - 'docker-compose.yml'
              - 'tests/**'
              - 'tarpaulin.toml'
              - 'tasks.toml'
            schema:
              - *ci
              - 'schema/**'
              - 'tasks/schema/**'
              - 'tasks.toml'

  test:
    name: Test
    needs:
      - paths
    if: ${{ !cancelled() && !failure() && needs.paths.outputs.test == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout
      id-token: write # for codecov

    env:
      MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup
      MISE_CARGO_HOME: /home/runner/.local/share/mise/cargo

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Start SSH test services
        run: docker compose up --build --detach --wait --wait-timeout 60

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.0
          install_args: --locked

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "false"

      - name: Test (coverage)
        run: mise run test:coverage

      - name: Show SSH service logs
        if: failure()
        run: docker compose logs --no-color

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@e79a6962e0d4c0c17b229090214935d2e33f8354 # v6.0.1
        with:
          files: ./cobertura.xml
          fail_ci_if_error: true
          use_oidc: true

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout

    env:
      MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup
      MISE_CARGO_HOME: /home/runner/.local/share/mise/cargo

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.0
          install_args: --locked

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          cache-bin: "false"

      - name: Render
        run: mise run --jobs 1 --continue-on-error render

      - name: Lint
        run: mise run --jobs 1 --continue-on-error check
        env:
          LINT: true
          GITHUB_TOKEN: ${{ github.token }}

  schema:
    name: Schema
    needs:
      - paths
    if: ${{ !cancelled() && !failure() && needs.paths.outputs.schema == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    env:
      MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup
      MISE_CARGO_HOME: /home/runner/.local/share/mise/cargo

    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@dba19683ed58901619b14f395a24841710cb4925 # v4.1.0
        with:
          version: 2026.6.0
          install_args: --locked

      - name: Validate schema
        run: mise run schema

  build:
    name: Build
    needs:
      - paths
    if: ${{ !cancelled() && !failure() && needs.paths.outputs.build == 'true' }}
    # All permissions in the callee workflow are required for the reusable workflow
    permissions:
      contents: write # for release checkout and GitHub release creation
      attestations: write # for release artifact attestations
      id-token: write # for release artifact attestations
      actions: read # for release artifact downloads
    uses: ./.github/workflows/release.yml

  ci-check:
    name: CI Check
    needs:
      - test
      - lint
      - build
      - schema
    # ref: https://github.com/aquaproj/aqua-registry/pull/38449#issuecomment-3038859524
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Fail CI Check
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - ci-check
    if: ${{ !cancelled() }}

    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # for actions-timeline

    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@44c9c178ffb2fb1d9859614a3ffa79ccfb77565e # v3.1.0
