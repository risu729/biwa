name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * SUN"

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  paths:
    name: Detect changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      pull-requests: read # for changed files

    outputs:
      build: ${{ steps.filter.outputs.build }}
      test: ${{ steps.filter.outputs.test }}
      schema: ${{ steps.filter.outputs.schema }}

    steps:
      - name: Check release-affecting files
        id: filter
        uses: dorny/paths-filter@d1c1ffe0248fe513906c8e24db8ea791d46f8590 # v3.0.3
        with:
          filters: |
            ci: &ci
              - 'mise.toml'
              - '.github/workflows/ci.yml'
            build: &build
              - *ci
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src/**'
              - '.github/workflows/release.yml'
              - 'dist-workspace.toml'
            test:
              - *ci
              - *build
              - 'tests/**'
              - 'tarpaulin.toml'
              - 'tasks.toml'
            schema:
              - *ci
              - 'schema/**'
              - 'tasks/schema/**'
              - 'tasks.toml'

  test:
    name: Test
    needs:
      - paths
    if: ${{ !cancelled() && !failure() && needs.paths.outputs.test == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout
      id-token: write # for codecov

    services:
      ssh-server:
        image: lscr.io/linuxserver/openssh-server@sha256:68b605929e83b2efe000da09269688f6d82a44579e8a18e2d9e8c8d272917cf7
        ports:
          - 2222:2222
        env:
          USER_NAME: testuser
          USER_PASSWORD: password123
          PASSWORD_ACCESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.9

      - name: Re-install Rust
        # cache doesn't work well with rust
        run: mise install rust --force

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Test (coverage)
        run: mise run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./cobertura.xml
          fail_ci_if_error: true
          use_oidc: true

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.9

      - name: Re-install Rust
        # cache doesn't work well with rust
        run: mise install rust --force

      - name: Rust Cache
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1

      - name: Render
        run: mise run --jobs 1 --continue-on-error render

      - name: Lint
        run: mise run --jobs 1 --continue-on-error check
        env:
          LINT: true
          GITHUB_TOKEN: ${{ github.token }}

  schema:
    name: Schema
    needs:
      - paths
    if: ${{ !cancelled() && !failure() && needs.paths.outputs.schema == 'true' }}
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.9

      - name: Validate schema
        run: mise run schema

  build:
    name: Build
    needs:
      - paths
    if: ${{ !cancelled() && !failure() && needs.paths.outputs.build == 'true' }}
    # All permissions in the callee workflow are required for the reusable workflow
    permissions:
      contents: write
      attestations: write
      id-token: write
      actions: read
    uses: ./.github/workflows/release.yml

  ci-check:
    name: CI Check
    needs:
      - test
      - lint
      - build
      - schema
    # ref: https://github.com/aquaproj/aqua-registry/pull/38449#issuecomment-3038859524
    if: always()
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Fail CI Check
        if: contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled')
        run: exit 1

  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - ci-check
    if: ${{ !cancelled() }}

    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read

    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3.0.0
