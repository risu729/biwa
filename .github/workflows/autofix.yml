# name must be autofix.ci for security reasons
# ref: https://autofix.ci/security
name: autofix.ci
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
permissions: {}
defaults:
  run:
    shell: bash
jobs:
  autofix:
    name: Autofix
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      contents: read # for checkout
    env:
      MISE_RUSTUP_HOME: /home/runner/.local/share/mise/rustup
      MISE_CARGO_HOME: /home/runner/.local/share/mise/cargo
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install mise
        uses: jdx/mise-action@e6a8b3978addb5a52f2b4cd9d91eafa7f0ab959d # v4.2.0
        with:
          version: 2026.7.0
      - name: Update mise lockfile
        if: github.event.pull_request.user.login == 'renovate[bot]'
        run: mise lock
        continue-on-error: true
      - name: Run autofix
        run: |
          mise run render --continue-on-error
          mise run check --continue-on-error
        continue-on-error: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: autofix.ci
        uses: autofix-ci/action@c5b2d67aa2274e7b5a18224e8171550871fc7e4a # v1.3.4
        with:
          commit-message: "style: apply automated fixes"
          # disable fail-fast to avoid notifications of canceled workflows
          fail-fast: false
  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - autofix
    if: ${{ !cancelled() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read # for actions-timeline
    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@7bf79990b7c09f5dfb570ac30b814ca597bd538e # v3.1.1
