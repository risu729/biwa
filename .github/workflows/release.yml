name: Release

on:
  workflow_call:
  push:
    tags:
      - v*

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  plan:
    name: Plan
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read # for checkout

    outputs:
      val: ${{ steps.plan.outputs.manifest }}
      tag: ${{ steps.mode.outputs.tag }}
      tag-flag: ${{ steps.mode.outputs.tag_flag }}
      publishing: ${{ steps.mode.outputs.publishing }}

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release mode
        id: mode
        run: |
          if [[ "${GITHUB_EVENT_NAME}" == "push" && "${GITHUB_REF}" == refs/tags/* ]]; then
            {
              echo "publishing=true"
              echo "tag=${GITHUB_REF_NAME}"
              echo "tag_flag=--tag=${GITHUB_REF_NAME}"
              echo "dist_args=host --steps=create --tag=${GITHUB_REF_NAME}"
            } >> "${GITHUB_OUTPUT}"
          else
            {
              echo "publishing=false"
              echo "tag="
              echo "tag_flag="
              echo "dist_args=plan"
            } >> "${GITHUB_OUTPUT}"
          fi

      - name: Install mise
        id: install-mise-publishing
        if: steps.mode.outputs.publishing == 'true'
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.7
          cache: false
        env:
          MISE_ENABLE_TOOLS: rust,cargo-dist

      - name: Install mise
        id: install-mise-non-publishing
        if: steps.install-mise-publishing.outcome == 'skipped'
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.7
          cache_key: "{{default}}-{{env.MISE_ENABLE_TOOLS}}"
        env:
          MISE_ENABLE_TOOLS: rust,cargo-dist

      - name: Re-install Rust
        if: steps.install-mise-non-publishing.outcome == 'success'
        # cache doesn't work well with rust
        run: mise install rust --force

      - name: Plan Release
        id: plan
        run: |
          # shellcheck disable=SC2086 # intentional word-splitting
          dist ${DIST_ARGS} --output-format=json > plan-dist-manifest.json
          jq --color-output . plan-dist-manifest.json
          echo "manifest=$(jq --compact-output . plan-dist-manifest.json)" >> "${GITHUB_OUTPUT}"
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DIST_ARGS: ${{ steps.mode.outputs.dist_args }}

      - name: Upload dist manifest
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts-plan-dist-manifest
          path: plan-dist-manifest.json

  build-local-artifacts:
    name: Build local artifacts (${{ join(matrix.targets, ', ') }})
    needs:
      - plan
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 20
    permissions:
      contents: read # for checkout

    strategy:
      matrix: ${{ fromJson(needs.plan.outputs.val).ci.github.artifacts_matrix }}
      fail-fast: false
    env:
      BUILD_MANIFEST_NAME: target/distrib/${{ join(matrix.targets, '-') }}-dist-manifest.json

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        id: install-mise-publishing
        if: needs.plan.outputs.publishing == 'true'
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.7
          cache: false
        env:
          MISE_ENABLE_TOOLS: rust,cargo-dist

      - name: Install mise
        id: install-mise-non-publishing
        if: steps.install-mise-publishing.outcome == 'skipped'
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.7
          cache_key: "{{default}}-{{env.MISE_ENABLE_TOOLS}}"
        env:
          MISE_ENABLE_TOOLS: rust,cargo-dist

      - name: Re-install Rust
        if: steps.install-mise-non-publishing.outcome == 'success'
        # cache doesn't work well with rust
        run: mise install rust --force

      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2
        if: steps.install-mise-non-publishing.outcome == 'success'
        with:
          key: ${{ join(matrix.targets, '-') }}

      - name: Install dependencies
        # zizmor: ignore[template-injection] required to run arbitrary commands
        run: |
          ${{ matrix.packages_install }}

      - name: Build artifacts
        run: |
          # shellcheck disable=SC2086 # intentional word-splitting
          dist build ${TAG_FLAG} --print=linkage --output-format=json ${DIST_ARGS} > dist-manifest.json
        env:
          TAG_FLAG: ${{ needs.plan.outputs.tag-flag }}
          DIST_ARGS: ${{ matrix.dist_args }}

      - name: Store built artifact paths
        id: paths
        run: |
          {
            echo 'paths<<EOF'
            dist print-upload-files-from-manifest --manifest dist-manifest.json
            echo 'EOF'
          } >> "${GITHUB_OUTPUT}"
          cp dist-manifest.json "${BUILD_MANIFEST_NAME}"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts-build-local-${{ join(matrix.targets, '_') }}
          path: |
            ${{ steps.paths.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  attest-local-artifacts:
    name: Attest local artifacts
    needs:
      - plan # required for safe context access
      - build-local-artifacts
    if: github.event_name == 'push' && needs.plan.outputs.publishing == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      id-token: write # for attestation
      attestations: write # for attestation

    steps:
      - name: Download local artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: artifacts-build-local-*
          path: target/distrib/
          merge-multiple: true

      - name: Attest build provenance
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: target/distrib/*

  build-global-artifacts:
    name: Build global artifacts
    needs:
      - plan # required for safe context access
      - build-local-artifacts
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout

    env:
      BUILD_MANIFEST_NAME: target/distrib/global-dist-manifest.json

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        id: install-mise-publishing
        if: needs.plan.outputs.publishing == 'true'
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.7
          cache: false
        env:
          MISE_ENABLE_TOOLS: rust,cargo-dist

      - name: Install mise
        id: install-mise-non-publishing
        if: steps.install-mise-publishing.outcome == 'skipped'
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.7
          cache_key: "{{default}}-{{env.MISE_ENABLE_TOOLS}}"
        env:
          MISE_ENABLE_TOOLS: rust,cargo-dist

      - name: Re-install Rust
        if: steps.install-mise-non-publishing.outcome == 'success'
        # cache doesn't work well with rust
        run: mise install rust --force

      - name: Download local artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - name: Build artifacts
        run: |
          # shellcheck disable=SC2086 # intentional word-splitting
          dist build ${TAG_FLAG} --output-format=json --artifacts=global > dist-manifest.json
        env:
          TAG_FLAG: ${{ needs.plan.outputs.tag-flag }}

      - name: Store built artifact paths
        id: paths
        run: |
          {
            echo "paths<<EOF"
            jq --raw-output ".upload_files[]" dist-manifest.json
            echo "EOF"
          } >> "${GITHUB_OUTPUT}"
          cp dist-manifest.json "${BUILD_MANIFEST_NAME}"

      - name: Upload artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: artifacts-build-global
          path: |
            ${{ steps.paths.outputs.paths }}
            ${{ env.BUILD_MANIFEST_NAME }}

  release:
    name: Release
    needs:
      - plan # required for safe context access
      - build-global-artifacts
    if: github.repository_owner == 'risu729' && needs.plan.outputs.publishing == 'true'
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: write # for checkout and create release

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.7
          cache: false
        env:
          MISE_ENABLE_TOOLS: rust,cargo-dist

      - name: Fetch artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: artifacts-*
          path: target/distrib/
          merge-multiple: true

      - name: Host
        id: host
        run: |
          # shellcheck disable=SC2086 # intentional word-splitting
          dist host ${TAG_FLAG} --steps=upload --steps=release --output-format=json > dist-manifest.json
          jq --color-output . dist-manifest.json
          echo "manifest=$(jq --compact-output . dist-manifest.json)" >> "${GITHUB_OUTPUT}"
        env:
          TAG_FLAG: ${{ needs.plan.outputs.tag-flag }}

      - name: Download local and global artifacts
        uses: actions/download-artifact@70fc10c6e5e1ce46ad2ea6f2b72d43f7d47b13c3 # v8.0.0
        with:
          pattern: artifacts-*
          path: artifacts
          merge-multiple: true

      - name: Remove granular manifests
        run: rm -f artifacts/*-dist-manifest.json

      - name: Create GitHub Release
        run: |
          echo "${BODY}" > "${RUNNER_TEMP}/notes.txt"
          # shellcheck disable=SC2086 # intentional word-splitting
          gh release create "${TAG}"\
            --verify-tag\
            --target "${RELEASE_COMMIT}"\
            ${PRERELEASE_FLAG}\
            --title "${TITLE}"\
            --notes-file "${RUNNER_TEMP}/notes.txt"\
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
          TAG: ${{ needs.plan.outputs.tag }}
          PRERELEASE_FLAG: ${{ fromJson(steps.host.outputs.manifest).announcement_is_prerelease && '--prerelease' || '' }}
          TITLE: ${{ fromJson(steps.host.outputs.manifest).announcement_title }}
          BODY: ${{ fromJson(steps.host.outputs.manifest).announcement_github_body }}
          RELEASE_COMMIT: ${{ github.sha }}

  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - release
    if: ${{ !cancelled() && github.event_name == 'push' }}

    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read

    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3.0.0
