name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 0 * * SUN"

permissions: {}

defaults:
  run:
    shell: bash

jobs:
  paths:
    name: Detect release changes
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      pull-requests: read # for changed files

    outputs:
      build: ${{ steps.filter.outputs.build }}

    steps:
      - name: Check release-affecting files
        id: filter
        uses: dorny/paths-filter@de90cc6fb38fc0963ad72b210f1f284cd68cea36 # v3.0.2
        with:
          filters: |
            build:
              - 'Cargo.toml'
              - 'Cargo.lock'
              - 'src/**'
              - '.github/workflows/release.yml'

  test:
    name: Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout
      id-token: write # for codecov

    services:
      ssh-server:
        image: lscr.io/linuxserver/openssh-server@sha256:68b605929e83b2efe000da09269688f6d82a44579e8a18e2d9e8c8d272917cf7
        ports:
          - 2222:2222
        env:
          USER_NAME: testuser
          USER_PASSWORD: password123
          PASSWORD_ACCESS: "true"

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.7

      - name: Re-install Rust
        # cache doesn't work well with rust
        run: mise install rust --force

      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Test (coverage)
        run: mise run test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@671740ac38dd9b0130fbe1cec585b89eea48d3de # v5.5.2
        with:
          files: ./cobertura.xml
          fail_ci_if_error: true
          use_oidc: true

  lint:
    name: Lint
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read # for checkout

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db # v3.6.3
        with:
          version: 2026.3.7

      - name: Re-install Rust
        # cache doesn't work well with rust
        run: mise install rust --force

      - name: Rust Cache
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Render
        run: mise run --jobs 1 --continue-on-error render

      - name: Lint
        run: mise run --jobs 1 --continue-on-error check
        env:
          LINT: true
          GITHUB_TOKEN: ${{ github.token }}

  build:
    name: Build
    needs:
      - paths
    if: needs.paths.outputs.build == 'true'
    permissions:
      contents: write # required by called workflow's release job declaration
      actions: read # required by called workflow's actions-timeline declaration
      id-token: write # required by called workflow's attestation job
      attestations: write # required by called workflow's attestation job
    uses: ./.github/workflows/release.yml

  ci-check:
    name: CI Check
    needs:
      - paths
      - test
      - lint
      - build
    if: ${{ always() }}
    runs-on: ubuntu-24.04
    timeout-minutes: 5

    steps:
      - name: Verify required CI results
        env:
          EVENT_NAME: ${{ github.event_name }}
          PATHS_RESULT: ${{ needs.paths.result }}
          TEST_RESULT: ${{ needs.test.result }}
          LINT_RESULT: ${{ needs.lint.result }}
          BUILD_RESULT: ${{ needs.build.result }}
        run: |
          [[ "${TEST_RESULT}" == "success" ]] || {
            echo "Test job result was ${TEST_RESULT}"
            exit 1
          }

          [[ "${LINT_RESULT}" == "success" ]] || {
            echo "Lint job result was ${LINT_RESULT}"
            exit 1
          }

          if [[ "${EVENT_NAME}" == "pull_request" ]]; then
            [[ "${PATHS_RESULT}" == "success" ]] || {
              echo "paths job result was ${PATHS_RESULT}"
              exit 1
            }

            [[ "${BUILD_RESULT}" == "success" || "${BUILD_RESULT}" == "skipped" ]] || {
              echo "Build job result was ${BUILD_RESULT}"
              exit 1
            }
          fi

          echo "CI check passed"

  actions-timeline:
    name: Generate Actions Timeline
    needs:
      - ci-check
    if: ${{ !cancelled() }}

    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read

    steps:
      - name: actions-timeline
        uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3.0.0
