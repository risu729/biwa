#:schema https://pitchfork.jdx.dev/schema.json

[settings]
general.mise = true

[daemons.ssh-server]
run = "docker compose up --build"
watch = ["docker-compose.yml", "tests/fixtures/ssh-capable/Dockerfile"]
auto = ["start", "stop"]
ready_cmd = "bash -c '</dev/tcp/127.0.0.1/2222 && </dev/tcp/127.0.0.1/2223'"

[daemons.docs]
run = "mise run docs:dev --strictPort"
watch = ["docs/package.json", "docs/bun.lock", "docs/.vitepress/config.ts"]
auto = ["start", "stop"]
ready_http = "http://localhost:5173"
