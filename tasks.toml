#:schema https://mise.jdx.dev/schema/mise-task.json
# ref: https://mise.jdx.dev/tasks/

[build]
run = "cargo build"
description = "Build the project."

[test]
run = "cargo test"
description = "Run the tests."

["test:coverage"]
run = "cargo tarpaulin"
description = "Run the tests with coverage."

["test:update-snapshot"]
run = "cargo insta test --accept --unreferenced=auto"
description = "Update test snapshots."
tools = { cargo-insta = "1.46.3" }

[check]
usage = '''
flag "--lint" help="Run hk check instead of fix"
'''
run = """
hk \
  {% if usage.lint %}check{% else %}fix --no-stage{% endif %} \
  --all --no-progress --no-fail-fast
"""
env.GH_TOKEN = "{% if env.GITHUB_TOKEN is defined %}{{ env.GITHUB_TOKEN }}{% endif %}"
description = "Run hk linters and formatters."

["docs:dev"]
run = "bun run vitepress dev"
dir = "docs"
description = "Start VitePress development server."

["docs:build"]
run = "bun run vitepress build"
dir = "docs"
description = "Build VitePress documentation for production."

["docs:preview"]
run = "bun run vitepress preview"
dir = "docs"
description = "Preview built VitePress documentation."

[render]
depends = ["render:*"]
description = "Run all render tasks."

["render:schema"]
run = "cargo run --quiet -- schema > schema/config.json"
description = "Generate the configuration schema."

["render:usage"]
run = [
	"cargo run --quiet -- usage > biwa.usage.kdl",
	"rm -rf docs/src/cli && mkdir -p docs/src/cli",
	"usage generate markdown -m --out-dir docs/src/cli --url-prefix /cli --html-encode --file biwa.usage.kdl",
]
description = "Generate usage spec and CLI reference docs."

["util:noop"]
run = ":"
hide = true
description = "No-op"

[schema]
depends = ["schema:*"]
description = "Validate config schema."

["schema:tombi"]
depends = [
	"{% if env.CI is defined %}util:noop{% else %}render:schema{% endif %}",
]
run = "tombi lint --error-on-warnings"
dir = "schema"
description = "Validate config schema with Tombi."
