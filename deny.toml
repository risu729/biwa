# ref: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
targets = [
	"aarch64-apple-darwin",
	"aarch64-unknown-linux-gnu",
	"x86_64-unknown-linux-gnu",
	"x86_64-unknown-linux-musl",
]
all-features = true

[advisories]
ignore = [
	# rsa crate timing sidechannel (Marvin Attack) — no fix available upstream.
	# Transitive dependency from russh via async-ssh2-tokio.
	"RUSTSEC-2023-0071",
]
unused-ignored-advisory = "deny"

[licenses]
allow = [
	"MIT",
	"Apache-2.0",
	"Unicode-3.0",
	"BSD-3-Clause",
	"ISC",
	"MPL-2.0",
]
unused-allowed-license = "deny"
unused-license-exception = "deny"

[bans]
multiple-versions = "warn"
multiple-versions-include-dev = true
wildcards = "deny"
skip = [
	# Transitive parser and SSH/RustCrypto stacks intentionally carry multiple
	# versions until their upstream dependency trees converge.
	{ name = "aead" },
	{ name = "aes" },
	{ name = "aes-gcm" },
	{ name = "block-buffer" },
	{ name = "block-padding" },
	{ name = "cbc" },
	{ name = "chacha20" },
	{ name = "cipher" },
	{ name = "const-oid" },
	{ name = "cpufeatures" },
	{ name = "crypto-common" },
	{ name = "ctr" },
	{ name = "digest" },
	{ name = "generic-array" },
	{ name = "getrandom" },
	{ name = "ghash" },
	{ name = "hashbrown" },
	{ name = "hmac" },
	{ name = "inout" },
	{ name = "json5" },
	{ name = "nix" },
	{ name = "pbkdf2" },
	{ name = "pem-rfc7468" },
	{ name = "polyval" },
	{ name = "rand" },
	{ name = "rand_core" },
	{ name = "sha1" },
	{ name = "sha2" },
	{ name = "toml" },
	{ name = "toml_datetime" },
	{ name = "unicode-width" },
	{ name = "universal-hash" },
	{ name = "winnow" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
unused-allowed-source = "deny"
