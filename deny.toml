# ref: https://embarkstudios.github.io/cargo-deny/checks/cfg.html

[graph]
targets = [
	"aarch64-apple-darwin",
	"aarch64-unknown-linux-gnu",
	"x86_64-unknown-linux-gnu",
	"x86_64-unknown-linux-musl",
]
all-features = true

[advisories]
ignore = [
        # rsa crate timing sidechannel (Marvin Attack) — no fix available upstream.
        # Transitive dependency from russh via async-ssh2-tokio.
        "RUSTSEC-2023-0071",
        # Incorrect Output of Incremental Portable SHAKE API
        # Only impacts users that rely on this XOF API to squeeze more than RATE bytes.
        # It does not impact the use of libcrux-sha3 in libcrux-ml-kem, which we use via russh.
        "RUSTSEC-2026-0074",
]
unused-ignored-advisory = "deny"

[licenses]
allow = [
	"MIT",
	"Apache-2.0",
	"Unicode-3.0",
	"BSD-3-Clause",
	"ISC",
	"CC0-1.0",
]
unused-allowed-license = "deny"
unused-license-exception = "deny"

[bans]
multiple-versions = "deny"
multiple-versions-include-dev = true
wildcards = "deny"
skip = [
	{ name = "block-buffer", version = "*" },
	{ name = "console", version = "*" },
	{ name = "const-oid", version = "*" },
	{ name = "crypto-bigint", version = "*" },
	{ name = "crypto-common", version = "*" },
	{ name = "der", version = "*" },
	{ name = "digest", version = "*" },
	{ name = "generic-array", version = "*" },
	{ name = "getrandom", version = "*" },
	{ name = "json5", version = "*" },
	{ name = "nix", version = "*" },
	{ name = "pem-rfc7468", version = "*" },
	{ name = "pkcs8", version = "*" },
	{ name = "rand", version = "*" },
	{ name = "rand_chacha", version = "*" },
	{ name = "rand_core", version = "*" },
	{ name = "sha1", version = "*" },
	{ name = "sha2", version = "*" },
	{ name = "signature", version = "*" },
	{ name = "spki", version = "*" },
	{ name = "toml", version = "*" },
	{ name = "toml_datetime", version = "*" },
	{ name = "unicode-width", version = "*" },
	{ name = "winnow", version = "*" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
required-git-spec = "rev"
unused-allowed-source = "deny"
