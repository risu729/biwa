[tools]
rust = { version = "1.96.1", profile = "default" }
"aqua:EmbarkStudios/cargo-deny" = "0.19.9"
"github:xd009642/tarpaulin" = "0.36.0"
usage = "3.5.3"
hk = "1.49.0"
actionlint = "1.7.12"
# used in actionlint
shellcheck = "0.11.0"
ghalint = "1.5.6"
pinact = "4.1.0"
zizmor = "1.26.1"
# required for pipx backend
uv = "0.11.26"
yamllint = "1.38.0"
yamlfmt = "0.21.0"
typos = "1.48.0"
release-plz = "0.3.158"
cargo-dist = "0.32.0"
bun = "1.3.14"
node = "26.4.0"
oxlint = "1.63.0"
oxfmt = "0.48.0"
pitchfork = "2.15.0"
tombi = "1.1.6"
"npm:ajv-cli" = "5.0.0"
wrangler = "4.93.0"
yq = "4.53.3"

[settings]
experimental = true
lockfile_platforms = [
	"linux-arm64",
	"linux-arm64-musl",
	"linux-x64",
	"linux-x64-musl",
	"macos-arm64",
	"macos-x64",
]

[env]
'_'.path = ["target/debug"]

[task_config]
includes = ["tasks.toml", "tasks/"]

[deps.bun_docs]
auto = true
sources = ["docs/bun.lock", "docs/package.json"]
outputs = ["docs/node_modules"]
run = "cd docs && bun install --frozen-lockfile"
