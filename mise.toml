[tools]
rust = { version = "1.94.1", profile = "default" }
"aqua:EmbarkStudios/cargo-deny" = "0.19.4"
"github:xd009642/tarpaulin" = "0.35.2"
usage = "3.2.0"
actionlint = "1.7.12"
# used in actionlint
shellcheck = "0.11.0"
ghalint = "1.5.5"
pinact = "3.9.0"
zizmor = "1.12.1"
# required for pipx backend
uv = "0.11.7"
yamllint = "1.38.0"
typos = "1.45.1"
release-plz = "0.3.157"
cargo-dist = "0.31.0"
bun = "1.3.12"
oxlint = "1.60.0"
oxfmt = "0.45.0"
pitchfork = "2.1.0"
tombi = "0.9.4"
"npm:ajv-cli" = "5.0.0"
yq = "4.53.2"

[settings]
experimental = true

[env]
'_'.path = ["target/debug/"]

[task_config]
includes = ["tasks.toml", "tasks/"]

[prepare.bun_docs]
auto = true
dir = "docs"
sources = ["docs/bun.lock", "docs/package.json"]
outputs = ["docs/node_modules"]
run = "bun install --frozen-lockfile"
