services:
  ssh-server:
    image: lscr.io/linuxserver/openssh-server@sha256:204b64775f7dfb17761ed0644df348ba3cd811628334cc723aa69d61f4db893d
    container_name: ssh_test_server
    ports:
      - "2222:2222"
    environment:
      - USER_NAME=testuser
      - USER_PASSWORD=password123
      - PASSWORD_ACCESS=true
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2222"]
      interval: 1s
      timeout: 1s
      retries: 30
  ssh-server-capable:
    build:
      context: .
      dockerfile: tests/fixtures/ssh-capable/Dockerfile
    container_name: ssh_test_server_capable
    ports:
      - "2223:2222"
    environment:
      - USER_NAME=testuser
      - USER_PASSWORD=password123
      - PASSWORD_ACCESS=true
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2222"]
      interval: 1s
      timeout: 1s
      retries: 30
