services:
  ssh-server:
    image: lscr.io/linuxserver/openssh-server@sha256:835c1f321ff16b10e1e3d82ec3808a5253f02f73a98d7dca5b0786184f44e69a
    container_name: ssh_test_server
    ports:
      - "2222:2222"
    environment:
      - USER_NAME=testuser
      - USER_PASSWORD=password123
      - PASSWORD_ACCESS=true
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2222"]
      interval: 1s
      timeout: 1s
      retries: 30
  ssh-server-capable:
    build:
      context: .
      dockerfile: tests/fixtures/ssh-capable/Dockerfile
    container_name: ssh_test_server_capable
    ports:
      - "2223:2222"
    environment:
      - USER_NAME=testuser
      - USER_PASSWORD=password123
      - PASSWORD_ACCESS=true
    healthcheck:
      test: ["CMD", "nc", "-z", "localhost", "2222"]
      interval: 1s
      timeout: 1s
      retries: 30
